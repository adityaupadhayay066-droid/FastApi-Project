<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ note[1] }} - Details</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <a href="/home" class="back-link">← Back to Dashboard</a>

        {% if message %}
            <div class="status-msg">
                <strong>Status:</strong> {{ message }}
            </div>
        {% endif %}

        <div class="detail-card">
            <h1>{{ note[1] }}</h1>
            
            {% if note[3] %}
            <div class="detail-meta">
                <span>Created on: {{ note[3] }}</span>
            </div>
            {% endif %}
            
            <div class="detail-content-heading">Content:</div>
            <div class="detail-body">{{ note[2] }}</div>

            <div class="detail-actions">
                <form action="/delete/{{ note[0] }}" method="POST">
                    <button type="submit" onclick="return confirm('Are you sure you want to delete this note?');">
                        Delete This Note
                    </button>
                </form>
            </div>
        </div>

        <hr>

        <h2 style="margin-bottom: 20px; font-size: 24px; font-weight: 600;">All Notes</h2>
        
        <div class="note-cointainer">
            {% for n in notes %}
            <div class="note-card">
                <h2>
                    <a href="/details/{{ n[0] }}" style="color: inherit; text-decoration: none;">
                        {{ n[1] }}
                    </a>
                </h2>
                <p>{{ n[2] }}</p>
                
                {% if n[3] %}
                <div class="note-date">Created on: {{ n[3] }}</div>
                {% endif %}
                
                <form action="/delete/{{ n[0] }}" method="POST">
                    <button type="submit"></button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
